# Fly.io deployment for the RAG chat API.
# Set secrets: fly secrets set OLLAMA_BASE_URL=... FRONTEND_URL=... POSTGRES_* ...

app = "portfolio-rag-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  UVICORN_PORT = "8000"
  LLM_PROVIDER = "ollama"
  KNOWLEDGE_DIR = "/app/knowledge"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
